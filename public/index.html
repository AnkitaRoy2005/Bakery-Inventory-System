<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crumb & Co. | Inventory</title><link rel="stylesheet" href="style.css">
</head>
<body>
  <main id="loginScreen" class="login-screen">
    <section class="login-card"><div class="brand-mark"></div><p class="eyebrow">BAKERY INVENTORY SYSTEM</p><h1>Sign in</h1><p class="muted">Use your account to continue.</p>
      <form id="loginForm" onsubmit="login(event)"><label>Username<input id="username" required autocomplete="username" placeholder="admin or shop"></label><label>Password<input id="password" type="password" required autocomplete="current-password" placeholder="admin123 or shop123"></label><button type="submit">Sign in</button><p class="hint">Demo: <b>admin / admin123</b> or <b>shop / shop123</b></p><p id="loginError" class="error" aria-live="polite"></p></form>
    </section>
  </main>
  <div id="app" class="app hidden">
    <aside><div class="logo"><span></span> Bakery Inventory<small>MANAGEMENT SYSTEM</small></div><nav id="nav"></nav><div class="user-box"><span id="roleLabel"></span><button class="text-btn" onclick="logout()">Log out</button></div></aside>
    <section class="content"><header><div><p class="eyebrow" id="pageKicker">OVERVIEW</p><h1 id="pageTitle">Dashboard</h1></div><div class="date" id="today"></div></header><p id="toast" role="status"></p><div id="view"></div></section>
  </div>
  <script src="script.js"></script>
</body>
</html>
